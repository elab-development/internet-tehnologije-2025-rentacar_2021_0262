<div class="home-container">
  <section class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">Dobrodošli u RentACar</h1>
      <p class="hero-subtitle">Pronađite savršen automobil za svaku priliku</p>
    </div>
  </section>

  <section class="cars-section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Naša flota vozila</h2>
        <button 
          *ngIf="authService.isAdmin()"
          class="btn btn-add"
          (click)="addNewCar()">
          + Dodaj oglas
        </button>
      </div>

      <div class="category-filter" *ngIf="categories.length > 0">
        <button 
          class="filter-btn"
          [class.active]="selectedCategoryId === null"
          (click)="filterByCategory(null)">
          Sve kategorije
        </button>
        <button 
          *ngFor="let cat of categories"
          class="filter-btn"
          [class.active]="selectedCategoryId === cat._id"
          (click)="filterByCategory(cat._id)">
          {{ cat.name }}
        </button>
      </div>

      <div *ngIf="isLoading" class="loading-message">Učitavanje automobila...</div>

      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

      <div class="cars-grid" *ngIf="!isLoading && !errorMessage">
        <app-car-card
          *ngFor="let car of cars"
          [car]="car"
          (rentClicked)="openRentModal($event)"
          (reviewsClicked)="goToReviews($event)"
          (editClicked)="editCar($event)">
        </app-car-card>
      </div>
    </div>
  </section>

  <div class="modal-overlay" *ngIf="selectedCar" (click)="closeRentModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h3 class="modal-title">Iznajmi: {{ selectedCar.brand }} {{ selectedCar.model }}</h3>
      <p class="modal-price">{{ selectedCar.pricePerDay }}€ / dan</p>

      <div class="modal-field">
        <label for="startDate">Datum preuzimanja</label>
        <input
          type="date"
          id="startDate"
          [(ngModel)]="rentalStartDate"
          [min]="todayDate"
          class="modal-input">
      </div>

      <div class="modal-field">
        <label for="endDate">Datum vraćanja</label>
        <input
          type="date"
          id="endDate"
          [(ngModel)]="rentalEndDate"
          [min]="rentalStartDate || todayDate"
          class="modal-input">
      </div>

      <p *ngIf="rentalError" class="modal-error">{{ rentalError }}</p>
      <p *ngIf="rentalMessage" class="modal-success">{{ rentalMessage }}</p>

      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="closeRentModal()">Otkaži</button>
        <button class="btn btn-rent" (click)="confirmRent()" [disabled]="isRenting">
          {{ isRenting ? 'Rezervišem...' : 'Potvrdi rezervaciju' }}
        </button>
      </div>
    </div>
  </div>
</div>
